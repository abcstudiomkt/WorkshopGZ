<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>汉语教程 · ตารางคัดอักษรจีน</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700;900&family=Noto+Sans+SC:wght@300;400&family=Noto+Sans+Thai:wght@300;400;600&family=Lora:wght@400;600&display=swap" rel="stylesheet">
<style>
:root {
  --ink:#1a1410; --paper:#f8f4ed; --paper2:#ede8df;
  --red:#b01010; --gold:#b8932a; --muted:#7a6e63;
  --green:#2e7d32; --blue:#1565c0; --line:rgba(0,0,0,0.13);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:"Noto Sans Thai","Noto Sans SC",sans-serif;background:var(--paper);color:var(--ink);}

/* ══ SCREEN UI ══ */
.screen-only{} 
@media print{.screen-only{display:none!important;}}

.topbar{
  background:var(--ink);color:white;padding:12px 20px;
  display:flex;align-items:center;gap:14px;
  position:sticky;top:0;z-index:100;box-shadow:0 3px 16px rgba(0,0,0,.4);
}
.topbar-title{font-family:"Noto Serif SC",serif;font-size:1.15rem;}
.topbar-sub{font-size:.72rem;color:rgba(255,255,255,.5);margin-top:1px;}
.topbar-actions{margin-left:auto;display:flex;gap:8px;}
.tbtn{
  padding:6px 16px;border-radius:20px;border:none;cursor:pointer;
  font-family:inherit;font-size:.8rem;font-weight:600;transition:all .2s;
}
.tbtn-ghost{background:rgba(255,255,255,.13);color:white;}
.tbtn-ghost:hover{background:rgba(255,255,255,.22);}
.tbtn-red{background:#c0392b;color:white;box-shadow:0 2px 10px rgba(192,57,43,.4);}
.tbtn-red:hover{background:#e74c3c;}

.lesson-bar{
  background:var(--paper2);padding:10px 20px;
  display:flex;gap:6px;flex-wrap:wrap;align-items:center;
  border-bottom:1px solid var(--line);
}
.lb-label{font-size:.72rem;color:var(--muted);font-weight:700;margin-right:2px;}
.lb-sep{width:1px;height:20px;background:var(--line);margin:0 3px;}
.lb-book{font-size:.68rem;font-weight:700;padding:0 2px;}
.lb-1a{color:var(--green);}
.lb-1b{color:var(--blue);}
.lbtn{
  padding:4px 11px;border-radius:14px;border:1.5px solid transparent;
  background:white;cursor:pointer;font-family:inherit;font-size:.74rem;
  font-weight:600;color:var(--muted);transition:all .15s;
}
.lbtn:hover{border-color:var(--red);color:var(--red);}
.lbtn.active{background:var(--red);color:white;border-color:var(--red);}

/* ══ CONTENT ══ */
.content{padding:20px;}

/* ══ INDEX SHEET ══ */
.index-sheet{
  background:white;border-radius:12px;
  box-shadow:0 2px 16px rgba(0,0,0,.09);
  margin-bottom:28px;overflow:hidden;
}
.idx-header{
  background:linear-gradient(135deg,#1a1410,#3d3228);
  color:white;padding:16px 22px;
}
.idx-header h2{font-family:"Noto Serif SC",serif;font-size:1.3rem;}
.idx-header p{font-size:.75rem;opacity:.55;margin-top:3px;}
.idx-search{padding:10px 22px;background:#faf8f5;border-bottom:1px solid var(--line);}
.idx-search input{
  width:100%;padding:8px 14px;
  border:1.5px solid var(--line);border-radius:8px;
  font-family:inherit;font-size:.85rem;outline:none;
}
.idx-search input:focus{border-color:var(--red);}
.idx-grid{
  display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));
  gap:1px;background:#e5ddd3;padding:1px;
}
.idx-entry{
  background:white;padding:9px 14px;
  display:flex;align-items:center;gap:10px;cursor:pointer;
  transition:background .1s;
}
.idx-entry:hover{background:#fff8f4;}
.ie-zh{font-family:"Noto Serif SC",serif;font-size:1.25rem;font-weight:700;min-width:36px;}
.ie-info{flex:1;min-width:0;}
.ie-py{font-size:.72rem;color:var(--red);}
.ie-th{font-size:.72rem;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ie-tag{
  font-size:.62rem;padding:2px 6px;border-radius:8px;
  color:white;font-weight:700;white-space:nowrap;
}
.bg1a{background:var(--green);}
.bg1b{background:var(--blue);}

/* ══ LESSON SHEET ══ */
.lesson-sheet{
  background:white;border-radius:12px;
  box-shadow:0 2px 16px rgba(0,0,0,.09);
  margin-bottom:28px;overflow:hidden;
}

/* Sheet header */
.sh-header{padding:14px 20px;display:flex;align-items:center;gap:14px;}
.sh-header.h1a{background:linear-gradient(135deg,#1b5e20,#388e3c);color:white;}
.sh-header.h1b{background:linear-gradient(135deg,#0d47a1,#1976d2);color:white;}
.sh-badge{
  font-family:"Noto Serif SC",serif;font-size:1.6rem;font-weight:900;
  width:50px;height:50px;border-radius:50%;
  background:rgba(255,255,255,.18);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.sh-zh{font-family:"Noto Serif SC",serif;font-size:1.2rem;font-weight:700;}
.sh-en{font-size:.76rem;opacity:.72;margin-top:2px;}
.sh-booktag{
  font-size:.65rem;padding:2px 7px;border-radius:8px;
  background:rgba(255,255,255,.22);font-weight:700;margin-top:4px;display:inline-block;
}
.sh-count{margin-left:auto;text-align:right;font-size:.72rem;opacity:.65;line-height:1.7;}

/* Instructions bar */
.sh-info{
  padding:6px 20px;background:#fffdf9;
  border-bottom:1px solid var(--line);
  display:flex;gap:18px;flex-wrap:wrap;align-items:center;
  font-size:.7rem;color:var(--muted);
}
.info-item{display:flex;align-items:center;gap:5px;}
.info-swatch{
  width:16px;height:16px;border:1px solid #ccc;border-radius:2px;
  background:#fff8f6;position:relative;flex-shrink:0;
}
.info-swatch::after{
  content:"文";font-family:"Noto Serif SC",serif;
  font-size:10px;color:var(--red);
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
}
.info-swatch2{width:16px;height:16px;border:1px solid #ccc;border-radius:2px;background:white;flex-shrink:0;}

/* ══ WORD BLOCK ══ */
.word-block{padding:8px 20px 0;}
.word-block:last-child{padding-bottom:12px;}
.word-divider{height:1px;background:linear-gradient(to right,transparent,#dfd8cc 20%,#dfd8cc 80%,transparent);margin:0 20px;}

.word-meta{display:flex;align-items:baseline;gap:7px;flex-wrap:wrap;margin-bottom:4px;}
.wm-num{font-size:.7rem;color:var(--muted);font-weight:700;min-width:18px;}
.wm-zh{font-family:"Noto Serif SC",serif;font-size:1.1rem;font-weight:700;}
.wm-py{font-size:.8rem;color:var(--red);font-weight:500;}
.wm-type{font-size:.62rem;padding:1px 5px;border-radius:4px;background:var(--paper2);color:var(--muted);}
.wm-dot{font-size:.65rem;color:var(--muted);}
.wm-en{font-size:.76rem;color:#333;}
.wm-th{font-size:.78rem;color:var(--blue);font-weight:500;}

/* ══ STROKE ORDER ROW ══ */
.stroke-row{
  display:flex;gap:3px;flex-wrap:wrap;
  align-items:center;margin-bottom:4px;
  padding:3px 0;
}
.stroke-step{
  font-family:"Noto Serif SC",serif;
  font-size:18px;color:#bbb;
  width:24px;height:24px;
  display:flex;align-items:center;justify-content:center;
  border:1px solid #eee;border-radius:3px;
  background:white;position:relative;flex-shrink:0;
  transition:all .15s;
}
.stroke-step:hover{border-color:var(--red);color:var(--red);}
.stroke-step.final-step{color:var(--red);border-color:#fcc;background:#fff8f6;}
.sn{position:absolute;top:0;right:1px;font-size:5.5px;color:#ccc;font-family:sans-serif;line-height:1;}

/* Arrow indicator */
.stroke-arrow{
  font-size:11px;color:var(--gold);margin:0 2px;
  align-self:center;
}

/* ══ GRID ROWS ══ */
.grid-wrap{display:flex;flex-direction:column;}
.grid-row{display:flex;border-top:1px solid #d5cdC5;}
.grid-row:last-child{border-bottom:1px solid #d5cdc5;}
.grid-row.row-practice{border-top:1.5px dashed #d0c8be;}

.gcell{
  width:36px;height:36px;flex-shrink:0;position:relative;
  border-right:1px solid #d5cdc5;
}
.gcell:last-child{border-right:none;}

/* Guides inside cell */
.gcell::before{
  content:"";position:absolute;inset:0;
  background:
    linear-gradient(rgba(0,0,0,.06) 0,rgba(0,0,0,.06) 1px,transparent 1px) center/1px 100% no-repeat,
    linear-gradient(to right,rgba(0,0,0,.06) 0,rgba(0,0,0,.06) 1px,transparent 1px) center/100% 1px no-repeat;
  pointer-events:none;
}
/* diagonal guides */
.gcell::after{
  content:"";position:absolute;inset:0;
  background:
    linear-gradient(to bottom right,transparent calc(50% - .5px),rgba(0,0,0,.04) 50%,transparent calc(50% + .5px)),
    linear-gradient(to bottom left,transparent calc(50% - .5px),rgba(0,0,0,.04) 50%,transparent calc(50% + .5px));
  pointer-events:none;
}
.gcell.model-cell{background:#fff8f6;}
.model-char{
  font-family:"Noto Serif SC",serif;font-size:24px;font-weight:700;
  color:var(--red);position:absolute;top:50%;left:50%;
  transform:translate(-50%,-48%);line-height:1;
  pointer-events:none;user-select:none;
}
/* Label on first model cell */
.row-label{
  position:absolute;top:1px;left:2px;
  font-size:5.5px;color:rgba(176,16,16,.6);
  font-family:sans-serif;line-height:1;z-index:2;
}

/* ══ PRINT STYLES ══ */
@media print {
  .screen-only{display:none!important;}
  body{background:white;font-size:11px;}
  .content{padding:0;}
  .index-sheet,.lesson-sheet{
    border-radius:0;box-shadow:none;
    page-break-after:always;margin:0;
  }
  .index-sheet:last-of-type,.lesson-sheet:last-of-type{page-break-after:auto;}
  .word-block{padding:6px 14px 0;}
  .word-divider{margin:0 14px;}
  .sh-header{padding:10px 14px;}
  .sh-info{padding:4px 14px;}
  .gcell{width:30px;height:30px;}
  .model-char{font-size:20px;}
  .stroke-step{width:20px;height:20px;font-size:14px;}
  .idx-search{display:none;}
  .idx-grid{grid-template-columns:repeat(4,1fr);}
}
</style>
</head>
<body>

<!-- ═══ TOP BAR ═══ -->
<nav class="topbar screen-only">
  <div>
    <div class="topbar-title">汉语教程 · ตารางคัดอักษรจีน</div>
    <div class="topbar-sub">Hanyu Jiaocheng Book 1A &amp; 1B · 25 บท · 379 คำศัพท์</div>
  </div>
  <div class="topbar-actions">
    <button class="tbtn tbtn-ghost" onclick="selectLesson('index',null)">📑 ดัชนี</button>
    <button class="tbtn tbtn-ghost" onclick="selectLesson('all',null)">📚 ทุกบท</button>
    <button class="tbtn tbtn-red" onclick="window.print()">🖨️ พิมพ์</button>
  </div>
</nav>

<!-- ═══ LESSON BAR ═══ -->
<div class="lesson-bar screen-only" id="lessonBar">
  <span class="lb-label">บท:</span>
  <button class="lbtn active" onclick="selectLesson('all',this)">ทุกบท</button>
  <div class="lb-sep"></div>
  <span class="lb-book lb-1a">1A</span>
</div>

<!-- ═══ CONTENT ═══ -->
<div class="content">

  <!-- INDEX -->
  <div class="index-sheet" id="sheet-index">
    <div class="idx-header">
      <h2>ดัชนีคำศัพท์ทั้งหมด &nbsp;词汇总表</h2>
      <p>Vocabulary Index · 379 คำ · 25 บท · 汉语教程 第一册上下</p>
    </div>
    <div class="idx-search screen-only">
      <input type="text" id="idxQ" placeholder="ค้นหา: จีน / พินอิน / ไทย / อังกฤษ..." oninput="filterIdx()">
    </div>
    <div class="idx-grid" id="idxGrid"></div>
  </div>

  <!-- LESSON SHEETS -->
  <div id="sheets"></div>

</div>

  "字":6,"话":8,"文":4,"章":11,"题":15,"问":6,"答":12,"对":5,"错":13,
};

function getStrokeCount(ch) {
  return STROKE_COUNTS[ch] || 8; // default 8 strokes if unknown
}

// Build progressive stroke steps for display
// Each step shows the character with increasing opacity to simulate progressive writing
function buildStrokeSteps(zh) {
  const chars = [...zh];
  const steps = [];
  chars.forEach(ch => {
    const n = getStrokeCount(ch);
    // Show: 1/4, 1/2, 3/4, full — or up to 6 steps
    const showAt = n <= 4 ? n : Math.min(6, n);
    const stepPts = [];
    for (let s = 1; s <= showAt; s++) {
      const pct = s / showAt;
      stepPts.push({ch, pct, s, total: n});
    }
    steps.push(...stepPts);
  });
  return steps;
}

// Render stroke steps as HTML
function renderStrokeSteps(zh) {
  const chars = [...zh];
  let html = '<div class="stroke-row">';
  
  chars.forEach((ch, ci) => {
    if (ci > 0) html += '<span class="stroke-arrow">→</span>';
    const n = getStrokeCount(ch);
    // Show character at progressive opacity levels: 3-5 steps
    const numSteps = Math.min(5, n);
    for (let s = 0; s < numSteps; s++) {
      const pct = (s + 1) / numSteps;
      const isFinal = s === numSteps - 1;
      const opacity = isFinal ? 1 : (0.2 + pct * 0.6);
      const color = isFinal ? 'var(--red)' : `rgba(150,30,30,${opacity})`;
      const bgColor = isFinal ? '#fff8f6' : 'white';
      const strokeNum = Math.round(pct * n);
      html += `<div class="stroke-step${isFinal?' final-step':''}" style="color:${color};background:${bgColor}">
        ${ch}<span class="sn">${strokeNum}/${n}</span>
      </div>`;
    }
  });
  html += '</div>';
  return html;
}

// Build index
function buildIndex() {
  const grid = document.getElementById('idxGrid');
  LESSONS.forEach(l => {
    l.words.forEach(w => {
      const d = document.createElement('div');
      d.className = 'idx-entry';
      d.dataset.q = (w.zh+w.py+w.th+w.en).toLowerCase();
      const tc = l.book==='1A' ? 'bg1a' : 'bg1b';
      d.innerHTML = `
        <div class="ie-zh">${w.zh}</div>
        <div class="ie-info">
          <div class="ie-py">${w.py}${w.type?' · '+w.type:''}</div>
          <div class="ie-th">${w.th}</div>
        </div>
        <div class="ie-tag ${tc}">บท${l.lesson_num}</div>`;
      d.onclick = () => selectLessonNum(l.lesson_num);
      grid.appendChild(d);
    });
  });
}

function filterIdx() {
  const q = document.getElementById('idxQ').value.toLowerCase().trim();
  document.querySelectorAll('.idx-entry').forEach(el => {
    el.style.display = (!q || el.dataset.q.includes(q)) ? '' : 'none';
  });
}

// Build lesson sheets
function buildSheets() {
  const bar = document.getElementById('lessonBar');
  const container = document.getElementById('sheets');
  let lastBook = '1A';

  LESSONS.forEach(l => {
    // Add button to bar
    if (l.book !== lastBook) {
      lastBook = l.book;
      const sep = document.createElement('div'); sep.className='lb-sep'; bar.appendChild(sep);
      const lbl = document.createElement('span');
      lbl.className='lb-book lb-1b'; lbl.textContent='1B'; bar.appendChild(lbl);
    }
    const btn = document.createElement('button');
    btn.className = 'lbtn lbtn-'+l.lesson_num;
    btn.textContent = l.lesson_num;
    btn.onclick = function(){selectLesson(l.lesson_num, this);};
    bar.appendChild(btn);

    // Build sheet
    const sheet = document.createElement('div');
    sheet.className = 'lesson-sheet';
    sheet.id = 'sheet-' + l.lesson_num;
    const hc = l.book==='1A' ? 'h1a' : 'h1b';
    const bookName = l.book==='1A' ? '汉语教程 第一册 上' : '汉语教程 第一册 下';

    const CELLS = 16; // grid cells per row

    let wordsHTML = '';
    l.words.forEach((w, wi) => {
      const chars = [...w.zh];
      const stepsHTML = renderStrokeSteps(w.zh);

      // Row 1: model chars + practice
      let r1 = '';
      for (let c=0; c<CELLS; c++) {
        if (c < chars.length) {
          r1 += `<div class="gcell model-cell">
            <div class="model-char">${chars[c]}</div>
            ${c===0?'<div class="row-label">แบบ</div>':''}
          </div>`;
        } else {
          r1 += `<div class="gcell"></div>`;
        }
      }
      // Row 2: all empty practice
      let r2 = '';
      for (let c=0; c<CELLS; c++) {
        r2 += c===0
          ? `<div class="gcell"><div class="row-label" style="color:rgba(100,100,100,.5)">ฝึก</div></div>`
          : `<div class="gcell"></div>`;
      }

      const typeHTML = w.type ? `<span class="wm-type">${w.type}</span>` : '';
      wordsHTML += `
        <div class="word-block">
          <div class="word-meta">
            <span class="wm-num">${wi+1}.</span>
            <span class="wm-zh">${w.zh}</span>
            <span class="wm-py">${w.py}</span>
            ${typeHTML}
            <span class="wm-dot">·</span>
            <span class="wm-en">${w.en}</span>
            <span class="wm-dot">·</span>
            <span class="wm-th">${w.th}</span>
          </div>
          ${stepsHTML}
          <div class="grid-wrap">
            <div class="grid-row">${r1}</div>
            <div class="grid-row row-practice">${r2}</div>
          </div>
        </div>
        ${wi < l.words.length-1 ? '<div class="word-divider"></div>' : ''}`;
    });

    sheet.innerHTML = `
      <div class="sh-header ${hc}">
        <div class="sh-badge">${l.lesson_num}</div>
        <div>
          <div class="sh-zh">第${l.lesson_num}课 · ${l.title}</div>
          <div class="sh-en">Lesson ${l.lesson_num} · ${l.title_en}</div>
          <div><span class="sh-booktag">${bookName}</span></div>
        </div>
        <div class="sh-count">${l.words.length} คำ<br>เล่ม ${l.book}</div>
      </div>
      <div class="sh-info">
        <div class="info-item"><div class="info-swatch"></div><span>แถวสีชมพู = ตัวอย่าง (อักษรสีแดง)</span></div>
        <div class="info-item"><div class="info-swatch2"></div><span>แถวประ = ฝึกเขียนด้วยตัวเอง</span></div>
        <div class="info-item" style="margin-left:auto;font-size:.65rem">ตัวเลขเล็ก = จำนวนขีด · ลูกศร = ลำดับตัวอักษร</div>
      </div>
      ${wordsHTML}`;
    container.appendChild(sheet);
  });
}

// Selection logic
let curSel = 'all';
function selectLesson(val, btn) {
  curSel = val;
  document.querySelectorAll('.lbtn').forEach(b=>b.classList.remove('active'));
  if (btn) btn.classList.add('active');
  const idx = document.getElementById('sheet-index');
  if (val==='all') {
    idx.style.display='';
    document.querySelectorAll('.lesson-sheet').forEach(s=>s.style.display='');
  } else if (val==='index') {
    idx.style.display='';
    document.querySelectorAll('.lesson-sheet').forEach(s=>s.style.display='none');
  } else {
    idx.style.display='none';
    document.querySelectorAll('.lesson-sheet').forEach(s=>{
      s.style.display = s.id==='sheet-'+val ? '' : 'none';
    });
  }
}
function selectLessonNum(n) {
  const btn = document.querySelector('.lbtn-'+n);
  selectLesson(n, btn);
  const sh = document.getElementById('sheet-'+n);
  if (sh) sh.scrollIntoView({behavior:'smooth',block:'start'});
}

// Init
buildIndex();
buildSheets();
// Default: show all
selectLesson('all', document.querySelector('.lbtn'));
</script>
